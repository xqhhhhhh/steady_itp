<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOL Ticket Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>NOL 抢票助手</h1>

      <section id="licenseBar" class="license-bar">
        <input
          id="ocrActivationCode"
          class="license-input"
          type="text"
          value=""
          placeholder="请输入激活码"
        />
        <button id="activateOcrBtn" class="license-btn" type="button">激活</button>
      </section>
      <p id="ocrLicenseStatus" class="license-status">未激活</p>

      <section class="panel">
        <h2>模式设置</h2>
        <div class="hint">抢票与捡漏必须二选一</div>

        <div class="mode-row" role="radiogroup" aria-label="运行模式">
          <label class="mode-option">
            <input id="runModeTimed" type="radio" name="runMode" value="timed" checked />
            <span>按时抢票模式</span>
          </label>
          <label class="mode-option">
            <input id="runModeScavenge" type="radio" name="runMode" value="scavenge" />
            <span>捡漏模式</span>
          </label>
        </div>

        <label class="field">
          <span>演唱会 URL</span>
          <input id="eventUrl" type="url" placeholder="https://world.nol.com/..." />
        </label>

        <div id="timedModeFields" class="subpanel">
          <h3>按时抢票专用</h3>
          <label class="field">
            <span>开抢时间</span>
            <input id="saleStartTime" type="datetime-local" />
          </label>

          <label class="field">
            <span>提前进场秒数</span>
            <input id="preEnterSeconds" type="number" min="5" max="300" value="30" />
          </label>

          <label class="field">
            <span>临界前置秒数</span>
            <input id="criticalPreSeconds" type="number" min="0.5" max="10" step="0.1" value="2.5" />
          </label>

          <label class="field">
            <span>临界后置秒数</span>
            <input id="criticalPostSeconds" type="number" min="1" max="20" step="0.1" value="8" />
          </label>

          <label class="field">
            <span>临界轮询毫秒</span>
            <input id="criticalTickMs" type="number" min="40" max="180" step="1" value="65" />
          </label>
        </div>

        <div id="scavengeModeFields" class="subpanel hidden">
          <h3>捡漏专用</h3>
          <label id="scavengeLoopIntervalWrap" class="field">
            <span>捡漏重跑间隔（分钟）(建议10分钟以上)</span>
            <input id="scavengeLoopIntervalMin" type="number" min="1" max="120" step="1" value="10" />
          </label>
          <label class="field">
            <span>单次循环时长上限（分钟，0=不限制，建议1-3分钟，过长请求过多可能短暂封号）</span>
            <input id="scavengeRoundMaxMin" type="number" min="0" max="180" step="1" value="0" />
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>通用配置</h2>

        <label class="field">
          <span>票数</span>
          <input id="quantity" type="number" min="1" max="4" value="1" />
        </label>

        <label class="field">
          <span>日期-月 (可选)</span>
          <select id="dateMonth"></select>
        </label>

        <label class="field">
          <span>日期-日 (可选)</span>
          <select id="dateDay"></select>
        </label>

        <label class="field">
          <span>日期-时间 (可选)</span>
          <select id="dateTime"></select>
        </label>

        <label class="field">
          <span>旧版区域查询顺序</span>
          <select id="legacyAreaOrderMode">
            <option value="default">默认顺序</option>
            <option value="custom">自定义顺序</option>
          </select>
        </label>

        <div id="legacyAreaCustomWrap" class="field hidden">
          <span>自定义区域 (三位数字，回车添加)</span>
          <input id="legacyAreaCodeInput" type="text" inputmode="numeric" placeholder="例如 205" maxlength="3" />
          <div id="legacyAreaCodeList" class="code-list"></div>
          <div class="hint">将按输入顺序逐个查找这些区域</div>
        </div>

        <label class="field">
          <span>钉钉 Webhook (可选)</span>
          <input id="dingTalkWebhookUrl" type="url" placeholder="https://oapi.dingtalk.com/robot/send?access_token=..." />
        </label>

        <label class="field">
          <span>钉钉加签 Secret (可选)</span>
          <input id="dingTalkSecret" type="text" placeholder="SEC..." />
        </label>

        <div id="vpnConfigWrap">
          <label id="vpnApiUrlField" class="field">
            <span>VPN 切换 API 地址</span>
            <input id="vpnApiUrl" type="url" value="http://127.0.0.1:8000" />
          </label>

          <label class="toggle-row" for="vpnAutoSwitchEnabled">
            <span>队列异常时自动切换 VPN</span>
            <input id="vpnAutoSwitchEnabled" type="checkbox" checked />
          </label>
        </div>
      </section>

      <div class="actions">
        <button id="startBtn" class="start" type="button">开始</button>
        <button id="stopBtn" class="stop" type="button">停止</button>
      </div>
      <div class="actions">
        <button id="saveBtn" class="save" type="button">保存配置</button>
      </div>

      <p id="status" class="status">未启动</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
