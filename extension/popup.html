<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOL Ticket Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>NOL 抢票助手</h1>

      <label class="field">
        <span>演唱会 URL</span>
        <input id="eventUrl" type="url" placeholder="https://world.nol.com/..." />
      </label>

      <label class="field">
        <span>开抢时间 (可选)</span>
        <input id="saleStartTime" type="datetime-local" />
      </label>

      <label class="field">
        <span>提前进场秒数</span>
        <input id="preEnterSeconds" type="number" min="5" max="300" value="30" />
      </label>

      <label class="field">
        <span>临界前置秒数</span>
        <input id="criticalPreSeconds" type="number" min="0.5" max="10" step="0.1" value="2.5" />
      </label>

      <label class="field">
        <span>临界后置秒数</span>
        <input id="criticalPostSeconds" type="number" min="1" max="20" step="0.1" value="8" />
      </label>

      <label class="field">
        <span>临界轮询毫秒</span>
        <input id="criticalTickMs" type="number" min="40" max="180" step="1" value="65" />
      </label>

      <label class="field">
        <span>票数</span>
        <input id="quantity" type="number" min="1" max="4" value="2" />
      </label>

      <label class="field">
        <span>日期-月 (可选)</span>
        <select id="dateMonth"></select>
      </label>

      <label class="field">
        <span>日期-日 (可选)</span>
        <select id="dateDay"></select>
      </label>

      <label class="field">
        <span>日期-时间 (可选)</span>
        <select id="dateTime"></select>
      </label>

      <label class="field">
        <span>国家区号</span>
        <input id="countryCode" type="text" value="86" />
      </label>

      <label class="field">
        <span>手机号</span>
        <input id="phoneNumber" type="text" value="18857560941" />
      </label>

      <label class="field">
        <span>OCR 后端地址</span>
        <input id="ocrApiUrl" type="url" value="http://127.0.0.1:8000/ocr/file" />
      </label>

      <label class="field">
        <span>钉钉 Webhook (可选)</span>
        <input id="dingTalkWebhookUrl" type="url" placeholder="https://oapi.dingtalk.com/robot/send?access_token=..." />
      </label>

      <label class="field">
        <span>钉钉加签 Secret (可选)</span>
        <input id="dingTalkSecret" type="text" placeholder="SEC..." />
      </label>

      <label class="field">
        <span>VPN 切换 API 地址</span>
        <input id="vpnApiUrl" type="url" value="http://127.0.0.1:8000" />
      </label>

      <label class="toggle-row" for="vpnAutoSwitchEnabled">
        <span>队列异常时自动切换 VPN</span>
        <input id="vpnAutoSwitchEnabled" type="checkbox" checked />
      </label>

      <label class="toggle-row" for="fullFlowEnabled">
        <span>执行全部流程（到信息提交）</span>
        <input id="fullFlowEnabled" type="checkbox" checked />
      </label>

      <div class="actions">
        <button id="startBtn" class="start" type="button">开始</button>
        <button id="stopBtn" class="stop" type="button">停止</button>
      </div>
      <div class="actions">
        <button id="saveBtn" class="save" type="button">保存配置</button>
      </div>
      <div class="actions">
        <button id="diagBtn" class="diag" type="button">诊断当前页</button>
      </div>

      <p id="status" class="status">未启动</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
